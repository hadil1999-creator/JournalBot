[SERVICE]
    Flush        1
    Daemon       Off
    Log_Level    info

[INPUT]
    Name         tail
    Path         ./logs/*.log
    Tag          my_project_logs
    Parser       json
    DB           ./flb_logs.db

[OUTPUT]
    Name         loki
    Match        *
    Host         localhost
    Port         3100
    Labels       job=fluent-bit
    Auto_Kubernetes_Labels Off
