# my global config
global:
  scrape_interval: 15s  # Set the scrape interval to every 15 seconds.
  evaluation_interval: 15s  # Evaluate rules every 15 seconds.

# Alertmanager configuration
alerting:
  alertmanagers:
    - static_configs:
        - targets:
           - "localhost:9093"

# Load rules once and periodically evaluate them
rule_files:
  - "alert_rules.yml"
  # - "second_rules.yml"

# Scrape configurations
scrape_configs:
  # Scrape Prometheus itself
  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]

  # Scrape Fluent Bit metrics
  - job_name: "fluent-bit"
    metrics_path: "/api/v1/metrics/prometheus"
    static_configs:
      - targets: ["localhost:2020"]

  # Scrape your application (if using ASP.NET Core or another service)
  - job_name: "my-app"
    static_configs:
      - targets: ["127.0.0.1:5000"]  # Update with your app's port
    scrape_interval: 15s # Or longer, depending on your needs



